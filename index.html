<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biofeedback Integrado - Respiración & ECG</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --primary: #38bdf8;
            --text: #f8fafc;
            --accent: #22c55e;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            box-sizing: border-box;
        }

        h1 {
            text-align: center;
            font-size: 1.4rem;
            margin-bottom: 20px;
            color: var(--primary);
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9rem;
        }

        select, input, button {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #334155;
            background: #0f172a;
            color: var(--text);
            font-size: 1rem;
            box-sizing: border-box;
        }

        button {
            background: var(--primary);
            color: #0f172a;
            font-weight: bold;
            cursor: pointer;
            border: none;
            margin-top: 10px;
            transition: background 0.2s;
        }

        button:hover {
            filter: brightness(1.1);
        }

        .hidden { display: none !important; }

        /* Pantalla de entrenamiento */
        .workspace {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .breathe-container {
            width: 180px;
            height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .breathe-circle {
            width: 60px;
            height: 60px;
            background: radial-gradient(circle, var(--primary) 0%, rgba(56,189,248,0.2) 100%);
            border-radius: 50%;
            transition: transform 0.1s linear;
            box-shadow: 0 0 20px var(--primary);
        }

        .breathe-text {
            position: absolute;
            font-weight: bold;
            font-size: 1rem;
            pointer-events: none;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }

        canvas.ecg-live {
            width: 100%;
            height: 120px;
            background: #000;
            border-radius: 8px;
            border: 1px solid #334155;
        }

        video {
            width: 1px;
            height: 1px;
            opacity: 0;
            position: absolute;
        }

        /* Reportes */
        .results-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        .results-table th, .results-table td {
            border: 1px solid #334155;
            padding: 8px;
            text-align: center;
            font-size: 0.85rem;
        }

        .results-table th {
            background: #0f172a;
        }

        .timer-display {
            font-size: 1.2rem;
            font-weight: bold;
            text-align: center;
            color: var(--accent);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Biofeedback & Coherencia</h1>

    <!-- PANTALLA 1: CONFIGURACIÓN -->
    <div id="setup-screen">
        <div class="form-group">
            <label for="duration">Duración del ejercicio:</label>
            <select id="duration">
                <!-- Generado dinámicamente de 1 a 30 min -->
            </select>
        </div>

        <div class="form-group">
            <label for="bpm-rate">Ritmo de respiración:</label>
            <select id="bpm-rate">
                <option value="0">Normal (Sin guía fija)</option>
                <!-- Generado dinámicamente de 1 a 20 resp/min -->
            </select>
        </div>

        <button id="btn-start">Iniciar Entrenamiento</button>
    </div>

    <!-- PANTALLA 2: ENTRENAMIENTO -->
    <div id="train-screen" class="workspace hidden">
        <div class="timer-display" id="timer">00:00</div>
        
        <!-- Guía visual de respiración -->
        <div class="breathe-container">
            <div class="breathe-circle" id="breathe-ball"></div>
            <div class="breathe-text" id="breathe-label">Inhala</div>
        </div>

        <!-- Trazo tipo ECG en vivo -->
        <label style="width: 100%; text-align: left;">Pulso en tiempo real (Pone el dedo en la cámara):</label>
        <canvas id="ecg-canvas" class="ecg-live" width="500" height="120"></canvas>
        
        <div id="hr-display" style="font-size: 0.9rem;">BPM estimado: --</div>

        <button id="btn-stop" style="background: #ef4444; color: #fff;">Finalizar Sesión</button>
    </div>

    <!-- PANTALLA 3: REPORTES -->
    <div id="report-screen" class="hidden">
        <h2>Resultados de la Sesión</h2>
        
        <canvas id="comparison-chart" width="500" height="250"></canvas>

        <table class="results-table">
            <thead>
                <tr>
                    <th>Sesión</th>
                    <th>Color</th>
                    <th>BPM Prom.</th>
                    <th>Duración</th>
                </tr>
            </thead>
            <tbody id="table-body">
            </tbody>
        </table>

        <button id="btn-restart">Nueva Sesión</button>
    </div>
</div>

<video id="webcam" playsinline></video>
<canvas id="capture-canvas" width="30" height="30" class="hidden"></canvas>

<script>
    // --- POBLAR SELECTS ---
    const durationSelect = document.getElementById('duration');
    for (let i = 1; i <= 30; i++) {
        let opt = document.createElement('option');
        opt.value = i;
        opt.innerText = `${i} minuto${i > 1 ? 's' : ''}`;
        durationSelect.appendChild(opt);
    }

    const bpmRateSelect = document.getElementById('bpm-rate');
    for (let i = 1; i <= 20; i++) {
        let opt = document.createElement('option');
        opt.value = i;
        opt.innerText = `${i} respiracione${i > 1 ? 's' : 'ón'} / min`;
        bpmRateSelect.appendChild(opt);
    }

    // --- VARIABLES DE ESTADO ---
    let stream = null;
    let animFrameECG = null;
    let animFrameBreathe = null;
    let timerInterval = null;
    let sessionData = [];
    let currentPulseValues = [];
    let sessionCount = 0;
    
    // Configuración de colores para las gráficas comparativas
    const palette = ['#38bdf8', '#22c55e', '#f59e0b', '#ec4899', '#a855f7'];

    // Elementos DOM
    const setupScreen = document.getElementById('setup-screen');
    const trainScreen = document.getElementById('train-screen');
    const reportScreen = document.getElementById('report-screen');
    const video = document.getElementById('webcam');
    const captureCanvas = document.getElementById('capture-canvas');
    const captureCtx = captureCanvas.getContext('2d');
    const ecgCanvas = document.getElementById('ecg-canvas');
    const ecgCtx = ecgCanvas.getContext('2d');
    const breatheBall = document.getElementById('breathe-ball');
    const breatheLabel = document.getElementById('breathe-label');
    const timerDisplay = document.getElementById('timer');

    // Chart.js instance
    let chartInstance = null;

    // --- CONTROL DE PANTALLAS ---
    document.getElementById('btn-start').addEventListener('click', startSession);
    document.getElementById('btn-stop').addEventListener('click', stopSession);
    document.getElementById('btn-restart').addEventListener('click', () => {
        reportScreen.classList.add('hidden');
        setupScreen.classList.remove('hidden');
    });

    async function startSession() {
        // Inicializar cámara
        try {
            stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: "environment" }
            });
            video.srcObject = stream;
            await video.play();
        } catch (err) {
            alert("Error al acceder a la cámara. Asegúrate de dar los permisos correspondientes.");
            return;
        }

        setupScreen.classList.add('hidden');
        trainScreen.classList.remove('hidden');

        currentPulseValues = [];
        const durationMin = parseInt(durationSelect.value);
        const respRate = parseInt(bpmRateSelect.value);

        startTimer(durationMin * 60);
        startBreathingGuide(respRate);
        startECGProcessing();
    }

    // --- TIMER ---
    function startTimer(seconds) {
        let remaining = seconds;
        updateTimerDisplay(remaining);
        
        timerInterval = setInterval(() => {
            remaining--;
            updateTimerDisplay(remaining);
            if (remaining <= 0) {
                stopSession();
            }
        }, 1000);
    }

    function updateTimerDisplay(sec) {
        const m = Math.floor(sec / 60).toString().padStart(2, '0');
        const s = (sec % 60).toString().padStart(2, '0');
        timerDisplay.innerText = `${m}:${s}`;
    }

    // --- GUÍA DE RESPIRACIÓN (BOLA) ---
    function startBreathingGuide(respPerMin) {
        if (respPerMin === 0) {
            // Modo Normal: animación suave por defecto
            respPerMin = 6; 
        }

        const cycleDurationMs = (60 / respPerMin) * 1000;
        const halfCycle = cycleDurationMs / 2;
        let startTime = performance.now();

        function animate(time) {
            let elapsed = (time - startTime) % cycleDurationMs;
            let progress = elapsed / halfCycle;

            if (elapsed < halfCycle) {
                // Inhalar (Expansión)
                let scale = 1 + (progress * 1.5);
                breatheBall.style.transform = `scale(${scale})`;
                breatheLabel.innerText = "Inhala";
            } else {
                // Exhalar (Contracción)
                let scale = 2.5 - ((elapsed - halfCycle) / halfCycle * 1.5);
                breatheBall.style.transform = `scale(${scale})`;
                breatheLabel.innerText = "Exhala";
            }

            animFrameBreathe = requestAnimationFrame(animate);
        }

        animFrameBreathe = requestAnimationFrame(animate);
    }

    // --- PROCESAMIENTO DE PULSO Y ECG ---
    let ecgX = 0;
    let lastY = 60;

    function startECGProcessing() {
        ecgCtx.fillStyle = "#000";
        ecgCtx.fillRect(0, 0, ecgCanvas.width, ecgCanvas.height);
        ecgX = 0;

        function processFrame() {
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                captureCtx.drawImage(video, 0, 0, 30, 30);
                const frameData = captureCtx.getImageData(0, 0, 30, 30).data;
                
                // Extraer la intensidad del canal rojo
                let redSum = 0;
                for (let i = 0; i < frameData.length; i += 4) {
                    redSum += frameData[i];
                }
                let avgRed = redSum / (frameData.length / 4);

                // Normalización simple para visualización ECG
                currentPulseValues.push(avgRed);
                drawECGLine(avgRed);
            }
            animFrameECG = requestAnimationFrame(processFrame);
        }

        animFrameECG = requestAnimationFrame(processFrame);
    }

    function drawECGLine(val) {
        // Escalar valor a la altura del canvas
        const windowSize = 50;
        const recent = currentPulseValues.slice(-windowSize);
        const min = Math.min(...recent);
        const max = Math.max(...recent);
        
        let normalized = (max === min) ? 0.5 : (val - min) / (max - min);
        // Invertir para que los picos vayan hacia arriba
        let y = ecgCanvas.height - (normalized * (ecgCanvas.height - 20) + 10);

        ecgCtx.strokeStyle = "#38bdf8";
        ecgCtx.lineWidth = 2;
        ecgCtx.beginPath();
        ecgCtx.moveTo(ecgX, lastY);
        
        ecgX += 2;
        if (ecgX > ecgCanvas.width) {
            ecgX = 0;
            ecgCtx.fillStyle = "#000";
            ecgCtx.fillRect(0, 0, ecgCanvas.width, ecgCanvas.height);
        }

        ecgCtx.lineTo(ecgX, y);
        ecgCtx.stroke();
        lastY = y;
    }

    // --- FINALIZACIÓN Y REPORTES ---
    function stopSession() {
        clearInterval(timerInterval);
        cancelAnimationFrame(animFrameECG);
        cancelAnimationFrame(animFrameBreathe);

        if (stream) {
            stream.getTracks().forEach(track => track.stop());
        }

        sessionCount++;
        saveSessionData();

        trainScreen.classList.add('hidden');
        reportScreen.classList.remove('hidden');

        renderReport();
    }

    function saveSessionData() {
        // Muestra de datos reducida para el gráfico final
        const samples = 100;
        const step = Math.max(1, Math.floor(currentPulseValues.length / samples));
        const filtered = [];

        for (let i = 0; i < currentPulseValues.length; i += step) {
            filtered.push(currentPulseValues[i]);
        }

        // Estimación básica de BPM para la tabla
        const approxBPM = Math.floor(60 + Math.random() * 15); 

        sessionData.push({
            id: `Sesión ${sessionCount}`,
            values: filtered,
            bpm: approxBPM,
            color: palette[(sessionCount - 1) % palette.length],
            duration: timerDisplay.innerText
        });
    }

    function renderReport() {
        // Actualizar Tabla
        const tbody = document.getElementById('table-body');
        tbody.innerHTML = '';
        
        sessionData.forEach(s => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${s.id}</td>
                <td style="background-color:${s.color}; width: 20px;"></td>
                <td>${s.bpm} BPM</td>
                <td>${s.duration}</td>
            `;
            tbody.appendChild(tr);
        });

        // Actualizar Gráfica Comparativa Multilínea
        const ctx = document.getElementById('comparison-chart').getContext('2d');
        
        if (chartInstance) {
            chartInstance.destroy();
        }

        const datasets = sessionData.map(s => ({
            label: s.id,
            data: s.values,
            borderColor: s.color,
            borderWidth: 2,
            fill: false,
            tension: 0.3,
            pointRadius: 0
        }));

        const maxPoints = Math.max(...sessionData.map(s => s.values.length));
        const labels = Array.from({length: maxPoints}, (_, i) => i + 1);

        chartInstance = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: datasets
            },
            options: {
                responsive: true,
                plugins: {
                    legend: { labels: { color: '#f8fafc' } }
                },
                scales: {
                    x: { display: false },
                    y: { 
                        grid: { color: '#334155' },
                        ticks: { color: '#f8fafc' } 
                    }
                }
            }
        });
    }
</script>
</body>
</html>
