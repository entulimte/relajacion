<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrenamiento de Pulso - 1 Minuto</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #121212;
            color: #ffffff;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            text-align: center;
            max-width: 400px;
            width: 100%;
            background: #1e1e1e;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        h1 {
            font-size: 1.6rem;
            margin-bottom: 5px;
            color: #ff4757;
        }
        .subtitle {
            font-size: 0.9rem;
            color: #a4b0be;
            margin-bottom: 20px;
        }
        #video-container {
            position: relative;
            width: 100px;
            height: 100px;
            margin: 0 auto 20px;
            border-radius: 50%;
            overflow: hidden;
            border: 4px solid #ff4757;
            background: #000;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .timer {
            font-size: 1.2rem;
            color: #ffa502;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .progress-bar-container {
            width: 100%;
            background-color: #2f3542;
            height: 8px;
            border-radius: 4px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        .progress-bar {
            width: 0%;
            height: 100%;
            background-color: #ffa502;
            transition: width 1s linear;
        }
        .bpm-display {
            font-size: 4rem;
            font-weight: bold;
            color: #ff4757;
            margin: 10px 0;
            line-height: 1;
        }
        .bpm-unit {
            font-size: 1rem;
            color: #a4b0be;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
        }
        .btn {
            background-color: #ff4757;
            color: white;
            border: none;
            padding: 15px 35px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(255, 71, 87, 0.4);
            width: 100%;
        }
        .btn:disabled {
            background-color: #57606f;
            box-shadow: none;
            cursor: not-allowed;
        }
        #status {
            margin-top: 15px;
            font-size: 0.85rem;
            color: #a4b0be;
            min-height: 35px;
        }
        .results-box {
            background: #2f3542;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            display: none;
        }
        .results-title {
            color: #2ed573;
            font-weight: bold;
            margin-bottom: 5px;
        }
        canvas { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>Control de Pulso</h1>
    <div class="subtitle">Prueba de Estabilidad (1 Minuto)</div>
    
    <div id="video-container">
        <video id="webcam" autoplay playsinline muted></video>
    </div>

    <div class="timer" id="timer-txt">Tiempo restante: 60s</div>
    <div class="progress-bar-container">
        <div class="progress-bar" id="p-bar"></div>
    </div>

    <div class="bpm-display" id="bpm-val">--</div>
    <div class="bpm-unit" id="bpm-lbl">BPM Actual</div>

    <button class="btn" id="start-btn">INICIAR PRUEBA</button>
    
    <div id="status">Ubica la cámara trasera con buena luz ambiental antes de iniciar.</div>

    <div class="results-box" id="results-panel">
        <div class="results-title">✓ PRUEBA COMPLETADA</div>
        <div style="font-size: 0.9rem; color: #f1f2f6;">
            Tu promedio final fue de:<br>
            <span style="font-size: 2rem; font-weight: bold; color: #2ed573;" id="avg-val">--</span> BPM
        </div>
    </div>
</div>

<canvas id="analyzer-canvas" width="100" height="100"></canvas>

<script>
    const video = document.getElementById('webcam');
    const canvas = document.getElementById('analyzer-canvas');
    const ctx = canvas.getContext('2d');
    const startBtn = document.getElementById('start-btn');
    const bpmVal = document.getElementById('bpm-val');
    const statusText = document.getElementById('status');
    const timerTxt = document.getElementById('timer-txt');
    const progressBar = document.getElementById('p-bar');
    const resultsPanel = document.getElementById('results-panel');
    const avgVal = document.getElementById('avg-val');

    let stream = null;
    let track = null;
    let isRunning = false;
    let frameInterval = null;
    let countdownInterval = null;
    
    let rValues = [];
    let times = [];
    let allValidBpms = []; // Para sacar el promedio final
    const maxDataPoints = 120; 
    let lastBpm = 0;
    let timeLeft = 60;

    startBtn.addEventListener('click', async () => {
        if (isRunning) {
            stopMeasurement(false);
            return;
        }

        startBtn.disabled = true;
        resultsPanel.style.display = "none";
        statusText.textContent = "Abriendo cámara...";
        allValidBpms = [];
        timeLeft = 60;
        timerTxt.textContent = `Tiempo restante: ${timeLeft}s`;
        progressBar.style.width = "0%";

        try {
            stream = await navigator.mediaDevices.getUserMedia({
                video: {
                    facingMode: "environment",
                    width: { ideal: 300 },
                    height: { ideal: 300 }
                }
            });

            video.srcObject = stream;
            track = stream.getVideoTracks()[0];

            // Intento de flash por si acaso
            setTimeout(async () => {
                try { await track.applyConstraints({ advanced: [{ torch: true }] }); } catch (e) {}
            }, 1000);

            startBtn.textContent = "ABORTAR";
            startBtn.disabled = false;
            isRunning = true;
            rValues = [];
            times = [];
            lastBpm = 0;
            
            frameInterval = setInterval(processFrame, 1000 / 30);
            
            // Lógica del Reloj de 1 minuto
            countdownInterval = setInterval(() => {
                timeLeft--;
                timerTxt.textContent = `Tiempo restante: ${timeLeft}s`;
                progressBar.style.width = `${((60 - timeLeft) / 60) * 100}%`;

                if (timeLeft <= 0) {
                    stopMeasurement(true); // Terminado con éxito
                }
            }, 1000);

            statusText.textContent = "Coloca firmemente tu dedo cubriendo el lente.";

        } catch (error) {
            statusText.textContent = "Error de acceso a cámara trasera.";
            startBtn.disabled = false;
        }
    });

    function stopMeasurement(isCompleted = false) {
        isRunning = false;
        clearInterval(frameInterval);
        clearInterval(countdownInterval);
        
        if (track) { try { track.stop(); } catch(e){} }
        if (stream) { stream.getTracks().forEach(t => t.stop()); }
        video.srcObject = null;
        
        startBtn.textContent = "INICIAR PRUEBA";
        bpmVal.textContent = "--";
        
        if (isCompleted) {
            statusText.textContent = "Ejercicio finalizado con éxito.";
            if (allValidBpms.length > 0) {
                const sum = allValidBpms.reduce((a, b) => a + b, 0);
                const avg = Math.round(sum / allValidBpms.length);
                avgVal.textContent = avg;
                resultsPanel.style.display = "block";
            } else {
                statusText.textContent = "Prueba terminada, pero no se captaron suficientes datos estables. Inténtalo de nuevo presionando mejor el lente.";
            }
        } else {
            statusText.textContent = "Medición abortada por el usuario.";
        }
    }

    function processFrame() {
        if (!isRunning || video.paused || video.ended) return;

        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imgData.data;

        let totalRed = 0;
        for (let i = 0; i < data.length; i += 4) {
            totalRed += data[i];
        }

        const avgRed = totalRed / (data.length / 4);
        rValues.push(avgRed);
        times.push(performance.now());

        if (rValues.length > maxDataPoints) {
            rValues.shift();
            times.shift();
        }

        if (rValues.length >= 80) {
            calculateBPM();
        }
    }

    function calculateBPM() {
        let peaks = [];
        let smoothValues = [];
        
        // Suavizado incrementado para amortiguar la falta de flash
        for (let i = 3; i < rValues.length - 3; i++) {
            let val = (rValues[i-3] + rValues[i-2] + rValues[i-1] + rValues[i] + rValues[i+1] + rValues[i+2] + rValues[i+3]) / 7;
            smoothValues.push({val: val, time: times[i]});
        }

        for (let i = 1; i < smoothValues.length - 1; i++) {
            if (smoothValues[i].val > smoothValues[i-1].val && smoothValues[i].val > smoothValues[i+1].val) {
                peaks.push(smoothValues[i].time);
            }
        }

        if (peaks.length >= 3) {
            let intervals = [];
            for (let i = 1; i < peaks.length; i++) {
                intervals.push(peaks[i] - peaks[i-1]);
            }
            
            const avgInterval = intervals.reduce((a, b) => a + b, 0) / intervals.length;
            let bpm = Math.round(60000 / avgInterval);

            // Filtro estricto para evitar saltos locos sin flash (rango normal)
            if (bpm >= 50 && bpm <= 150) {
                if (lastBpm === 0) lastBpm = bpm;
                
                // Amortiguación fuerte: el valor nuevo solo cambia un 10% del mostrado
                lastBpm = Math.round(lastBpm * 0.9 + bpm * 0.1);
                
                bpmVal.textContent = lastBpm;
                allValidBpms.push(lastBpm); // Guardando para el promedio final
                statusText.textContent = "Mantén el dedo bien quieto frente a una luz estable...";
            }
        }
    }
</script>
</body>
</html>
