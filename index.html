<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medidor de Pulso Cardíaco</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #121212;
            color: #ffffff;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            text-align: center;
            max-width: 400px;
            width: 100%;
            background: #1e1e1e;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        h1 {
            font-size: 1.8rem;
            margin-bottom: 10px;
            color: #ff4757;
        }
        p {
            font-size: 0.95rem;
            color: #a4b0be;
            margin-bottom: 25px;
            line-height: 1.4;
        }
        #video-container {
            position: relative;
            width: 150px;
            height: 150px;
            margin: 0 auto 25px;
            border-radius: 50%;
            overflow: hidden;
            border: 5px solid #ff4757;
            background: #000;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .bpm-display {
            font-size: 4rem;
            font-weight: bold;
            color: #ff4757;
            margin: 15px 0;
            line-height: 1;
        }
        .bpm-unit {
            font-size: 1.2rem;
            color: #a4b0be;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn {
            background-color: #ff4757;
            color: white;
            border: none;
            padding: 15px 35px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(255, 71, 87, 0.4);
            width: 100%;
        }
        .btn:active {
            transform: scale(0.98);
        }
        .btn:disabled {
            background-color: #57606f;
            box-shadow: none;
            cursor: not-allowed;
        }
        #status {
            margin-top: 15px;
            font-size: 0.85rem;
            color: #ffa502;
        }
        canvas {
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Medidor de Pulso</h1>
    <p>Coloca la yema de tu dedo índice tapando por completo el lente de la cámara trasera de tu celular.</p>
    
    <div id="video-container">
        <video id="webcam" autoplay playsinline muted></video>
    </div>

    <div class="bpm-display" id="bpm-val">--</div>
    <div class="bpm-unit" id="bpm-lbl">BPM</div>

    <button class="btn" id="start-btn">INICIAR MEDICIÓN</button>
    <div id="status">Presiona iniciar y acepta los permisos de cámara.</div>
</div>

<canvas id="analyzer-canvas" width="100" height="100"></canvas>

<script>
    const video = document.getElementById('webcam');
    const canvas = document.getElementById('analyzer-canvas');
    const ctx = canvas.getContext('2d');
    const startBtn = document.getElementById('start-btn');
    const bpmVal = document.getElementById('bpm-val');
    const bpmLbl = document.getElementById('bpm-lbl');
    const statusText = document.getElementById('status');

    let stream = null;
    let track = null;
    let isRunning = false;
    let frameInterval = null;
    
    // Algoritmo PPG sencillo
    let rValues = [];
    let times = [];
    const maxDataPoints = 150; 
    let lastBpm = 0;

    startBtn.addEventListener('click', async () => {
        if (isRunning) {
            stopMeasurement();
            return;
        }

        startBtn.disabled = true;
        statusText.textContent = "Accediendo a la cámara trasera...";

        try {
            // Forzar cámara trasera ('environment')
            stream = await navigator.mediaDevices.getUserMedia({
                video: {
                    facingMode: { exact: "environment" },
                    width: { ideal: 300 },
                    height: { ideal: 300 }
                }
            }).catch(async () => {
                // Alternativa por si falla la trasera exacta
                return await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment" }
                });
            });

            video.srcObject = stream;
            track = stream.getVideoTracks()[0];

            // Forzar encendido de Flash (Torch)
            setTimeout(async () => {
                try {
                    await track.applyConstraints({
                        advanced: [{ torch: true }]
                    });
                    statusText.textContent = "Cámara y Flash activados. Coloca tu dedo sobre el lente.";
                } catch (err) {
                    console.log("No se pudo encender el flash automáticamente:", err);
                    statusText.textContent = "Cámara lista. Usa una luz fuerte si el flash no encendió.";
                }
            }, 1000);

            startBtn.textContent = "DETENER";
            startBtn.disabled = false;
            isRunning = true;
            rValues = [];
            times = [];
            
            // Comenzar procesamiento de frames
            frameInterval = setInterval(processFrame, 1000 / 30); // 30 FPS

        } catch (error) {
            console.error(error);
            statusText.textContent = "Error al abrir la cámara. Revisa los permisos.";
            startBtn.disabled = false;
        }
    });

    function stopMeasurement() {
        isRunning = false;
        clearInterval(frameInterval);
        if (track) {
            try { track.applyConstraints({ advanced: [{ torch: false }] }); } catch(e){}
            track.stop();
        }
        if (stream) {
            stream.getTracks().forEach(t => t.stop());
        }
        video.srcObject = null;
        startBtn.textContent = "INICIAR MEDICIÓN";
        statusText.textContent = "Medición detenida.";
        bpmVal.textContent = "--";
    }

    function processFrame() {
        if (!isRunning || video.paused || video.ended) return;

        // Dibujar frame en un canvas pequeño para analizar píxeles
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imgData.data;

        let totalRed = 0;
        let count = 0;

        // Sumar canal Rojo (R)
        for (let i = 0; i < data.length; i += 4) {
            totalRed += data[i];
            count++;
        }

        const avgRed = totalRed / count;
        const now = performance.now();

        rValues.push(avgRed);
        times.push(now);

        if (rValues.length > maxDataPoints) {
            rValues.shift();
            times.shift();
        }

        // Analizar pulso solo si hay suficientes datos
        if (rValues.length >= 100) {
            calculateBPM();
        }
    }

    function calculateBPM() {
        // Encontrar picos en el flujo de color rojo
        let peaks = [];
        const threshold = 0.3; // Sensibilidad al cambio
        
        // Filtro básico de suavizado
        let smoothValues = [];
        for (let i = 2; i < rValues.length - 2; i++) {
            let val = (rValues[i-2] + rValues[i-1] + rValues[i] + rValues[i+1] + rValues[i+2]) / 5;
            smoothValues.push({val: val, time: times[i]});
        }

        // Buscar picos locales
        for (let i = 1; i < smoothValues.length - 1; i++) {
            if (smoothValues[i].val > smoothValues[i-1].val && smoothValues[i].val > smoothValues[i+1].val) {
                peaks.push(smoothValues[i].time);
            }
        }

        if (peaks.length >= 2) {
            let intervals = [];
            for (let i = 1; i < peaks.length; i++) {
                intervals.push(peaks[i] - peaks[i-1]);
            }
            
            // Promedio de intervalos en milisegundos
            const avgInterval = intervals.reduce((a, b) => a + b, 0) / intervals.length;
            
            // Calcular BPM (60,000 ms / intervalo promedio)
            let bpm = Math.round(60000 / avgInterval);

            // Filtrar lecturas irreales (normal para humanos: 45 - 160 BPM en reposo/ejercicio leve)
            if (bpm >= 45 && bpm <= 165) {
                // Suavizar el valor mostrado combinándolo con la lectura anterior
                if (lastBpm === 0) lastBpm = bpm;
                lastBpm = Math.round(lastBpm * 0.8 + bpm * 0.2);
                
                bpmVal.textContent = lastBpm;
                statusText.textContent = "Midiendo... Mantén el dedo firme y quieto.";
            }
        }
    }
</script>
</body>
</html>
